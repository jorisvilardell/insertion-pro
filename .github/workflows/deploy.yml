name: Deploy to GitHub Pages

on:
  # Déclenche le déploiement à chaque push sur main
  push:
    branches: [main]
  # Permet un déclenchement manuel depuis l'onglet Actions
  workflow_dispatch:

# Permissions nécessaires au déploiement GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement concurrent
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          node-version: 22
          # Épinglé sur la même version que le local (pnpm 9).
          # pnpm 10 ignore "pnpm.onlyBuiltDependencies" de package.json
          # et échoue sur les build scripts non approuvés (esbuild, sharp).
          package-manager: pnpm@9.12.2

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
